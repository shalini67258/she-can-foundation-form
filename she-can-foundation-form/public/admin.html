<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>She Can Foundation - Admin Panel</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page admin-page">
    <header class="header">
      <div class="logo-circle">SC</div>
      <h1>Admin Panel</h1>
      <p class="tagline">View all form submissions</p>
    </header>

    <main class="card">
      <div class="login-box">
        <input type="password" id="adminPassword" placeholder="Enter admin password" />
        <button id="loginBtn">View</button>
      </div>
      <div class="error" id="adminError" style="margin-top:8px;"></div>

      <table id="resultsTable" class="hidden">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
            <th>Submitted At</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </main>

    <footer class="footer">
      <a href="index.html">← Back to Form</a>
    </footer>
  </div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const adminPassword = document.getElementById('adminPassword');
    const adminError = document.getElementById('adminError');
    const resultsTable = document.getElementById('resultsTable');
    const resultsBody = document.getElementById('resultsBody');

    loginBtn.addEventListener('click', async () => {
      adminError.textContent = '';
      resultsTable.classList.add('hidden');

      try {
        const res = await fetch('/api/contact', {
          headers: { 'x-admin-password': adminPassword.value },
        });
        const data = await res.json();

        if (!res.ok || !data.success) {
          adminError.textContent = data.error || 'Failed to load submissions.';
          return;
        }

        resultsBody.innerHTML = '';
        data.data.forEach((row) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.id}</td>
            <td>${row.name}</td>
            <td>${row.email}</td>
            <td>${row.message}</td>
            <td>${new Date(row.submitted_at).toLocaleString()}</td>
          `;
          resultsBody.appendChild(tr);
        });

        resultsTable.classList.remove('hidden');
      } catch (err) {
        adminError.textContent = 'Could not reach the server.';
      }
    });
  </script>
</body>
</html>
