<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>She Can Foundation - Admin Panel</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page admin-page">
    <header class="header">
      <div class="logo-circle">SC</div>
      <h1>Admin Panel</h1>
      <p class="tagline">Register or log in to view submissions</p>
    </header>

    <!-- LOGIN CARD -->
    <main class="card" id="loginCard">
      <h2>Admin Login</h2>
      <div class="field">
        <label for="loginUsername">Username</label>
        <input type="text" id="loginUsername" placeholder="Enter username" />
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" />
      </div>
      <button id="loginBtn">Log In</button>
      <div class="error" id="loginError" style="margin-top:8px;"></div>
      <p class="sub" style="margin-top:16px;">
        No account yet? <a href="#" id="showRegister">Register as admin</a>
      </p>
    </main>

    <!-- REGISTER CARD -->
    <main class="card hidden" id="registerCard">
      <h2>Register Admin</h2>
      <div class="field">
        <label for="regUsername">Username</label>
        <input type="text" id="regUsername" placeholder="Choose a username" />
      </div>
      <div class="field">
        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="Choose a password (min 6 chars)" />
      </div>
      <button id="registerBtn">Register</button>
      <div class="error" id="registerError" style="margin-top:8px;"></div>
      <div class="success-msg hidden" id="registerSuccess"></div>
      <p class="sub" style="margin-top:16px;">
        Already have an account? <a href="#" id="showLogin">Log in</a>
      </p>
    </main>

    <!-- SUBMISSIONS CARD -->
    <main class="card hidden" id="dataCard">
      <h2>Submissions</h2>
      <button id="logoutBtn" style="width:auto; padding:8px 14px; float:right;">Log Out</button>
      <table id="resultsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
            <th>Submitted At</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </main>

    <footer class="footer">
      <a href="index.html">← Back to Form</a>
    </footer>
  </div>

  <script>
    const loginCard = document.getElementById('loginCard');
    const registerCard = document.getElementById('registerCard');
    const dataCard = document.getElementById('dataCard');

    document.getElementById('showRegister').addEventListener('click', (e) => {
      e.preventDefault();
      loginCard.classList.add('hidden');
      registerCard.classList.remove('hidden');
    });

    document.getElementById('showLogin').addEventListener('click', (e) => {
      e.preventDefault();
      registerCard.classList.add('hidden');
      loginCard.classList.remove('hidden');
    });

    // ---------- Register ----------
    document.getElementById('registerBtn').addEventListener('click', async () => {
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      const registerError = document.getElementById('registerError');
      const registerSuccess = document.getElementById('registerSuccess');
      registerError.textContent = '';
      registerSuccess.classList.add('hidden');

      try {
        const res = await fetch('/api/admin/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (!res.ok || !data.success) {
          registerError.textContent = data.error || 'Registration failed.';
          return;
        }

        registerSuccess.textContent = data.message;
        registerSuccess.classList.remove('hidden');
        setTimeout(() => {
          registerCard.classList.add('hidden');
          loginCard.classList.remove('hidden');
        }, 1200);
      } catch (err) {
        registerError.textContent = 'Could not reach the server.';
      }
    });

    // ---------- Login ----------
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const loginError = document.getElementById('loginError');
      loginError.textContent = '';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (!res.ok || !data.success) {
          loginError.textContent = data.error || 'Login failed.';
          return;
        }

        sessionStorage.setItem('adminToken', data.token);
        loginCard.classList.add('hidden');
        loadSubmissions();
      } catch (err) {
        loginError.textContent = 'Could not reach the server.';
      }
    });

    // ---------- Logout ----------
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const token = sessionStorage.getItem('adminToken');
      await fetch('/api/admin/logout', {
        method: 'POST',
        headers: { 'x-admin-token': token },
      });
      sessionStorage.removeItem('adminToken');
      dataCard.classList.add('hidden');
      loginCard.classList.remove('hidden');
    });

    // ---------- Load submissions ----------
    async function loadSubmissions() {
      const token = sessionStorage.getItem('adminToken');
      const resultsBody = document.getElementById('resultsBody');

      try {
        const res = await fetch('/api/contact', {
          headers: { 'x-admin-token': token },
        });
        const data = await res.json();

        if (!res.ok || !data.success) {
          sessionStorage.removeItem('adminToken');
          dataCard.classList.add('hidden');
          loginCard.classList.remove('hidden');
          document.getElementById('loginError').textContent = 'Session expired. Please log in again.';
          return;
        }

        resultsBody.innerHTML = '';
        data.data.forEach((row) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${row.id}</td>
            <td>${row.name}</td>
            <td>${row.email}</td>
            <td>${row.message}</td>
            <td>${new Date(row.submitted_at).toLocaleString()}</td>
          `;
          resultsBody.appendChild(tr);
        });

        dataCard.classList.remove('hidden');
      } catch (err) {
        console.error(err);
      }
    }

    // If already logged in this browser session, skip straight to data
    if (sessionStorage.getItem('adminToken')) {
      loginCard.classList.add('hidden');
      loadSubmissions();
    }
  </script>
</body>
</html>
